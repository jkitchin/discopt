title: discopt
author: John Kitchin
logo: discopt-logo.png
execute:
  execute_notebooks: "off"
repository:
  url: https://github.com/jkitchin/discopt
  branch: main
sphinx:
  extra_extensions:
    - sphinxcontrib.bibtex
    - autoapi.extension
  config:
    bibtex_bibfiles: ["references.bib"]
    bibtex_reference_style: author_year
    autoapi_dirs: ["../python/discopt"]
    autoapi_ignore: ["**/tests/**", "**/_rust*", "**/modeling/examples.py"]
    autoapi_options:
      - members
      - undoc-members
      - show-inheritance
      - show-module-summary
    autoapi_keep_files: false
    autoapi_add_toctree_entry: false
    suppress_warnings: ["etoc.toctree", "myst.header"]
