# discopt Benchmark Configuration
# All performance targets and phase gate criteria are defined here.
# This is the single source of truth for "are we on track?"

[general]
time_limit_seconds = 3600
memory_limit_mb = 32768
num_runs = 3                    # Independent runs for determinism check
float_tolerance = 1e-6          # Absolute tolerance for solution comparison
relative_gap_tolerance = 1e-4   # Relative optimality gap tolerance
results_dir = "reports"

# ─────────────────────────────────────────────────────────────
# BENCHMARK SUITES
# ─────────────────────────────────────────────────────────────

[suites.smoke]
description = "Quick sanity check (10 small instances)"
sources = ["minlplib"]
max_variables = 5
max_constraints = 5
max_instances = 10
time_limit_seconds = 60

[suites.nonconvex_qcp_smoke]
description = "Targeted probe of nonconvex QCP / bilinear pooling instances"
sources = ["minlplib"]
instance_list_inline = [
  "pooling_haverly1stp", "pooling_haverly3stp", "pooling_rt2tp",
  "ex9_1_8",
  "kall_congruentcircles_c41", "kall_congruentcircles_c51",
  "kall_circlesrectangles_c1r13",
  "wastewater15m1",
]
time_limit_seconds = 60

[suites.phase1]
description = "Phase 1 milestone: small instances, ≤10 vars"
sources = ["minlplib"]
max_variables = 10
max_constraints = 10
time_limit_seconds = 3600

[suites.phase2]
description = "Phase 2 milestone: medium instances, ≤50 vars"
sources = ["minlplib"]
max_variables = 50
max_constraints = 100
time_limit_seconds = 3600

[suites.phase3]
description = "Phase 3 milestone: large instances, ≤100 vars"
sources = ["minlplib"]
max_variables = 100
max_constraints = 500
time_limit_seconds = 3600

[suites.small]
description = "Stratified MINLPLib (~60 instances spanning every class+size, ~30 min on 8 workers)"
sources = ["minlplib"]
instance_list = "config/suites/small.txt"
time_limit_seconds = 60         # per-instance wall-clock cap

[suites.medium]
description = "Stratified MINLPLib (~250 instances spanning every class+size, ~2 h on 8 workers)"
sources = ["minlplib"]
instance_list = "config/suites/medium.txt"
time_limit_seconds = 300

[suites.full]
description = "Complete MINLPLib benchmark (~1700 instances, 12-30 h on 8 workers)"
sources = ["minlplib"]
instance_list = "config/suites/full.txt"
time_limit_seconds = 600

[suites.comparison]
description = "Head-to-head comparison on curated set"
sources = ["minlplib"]
instance_list = "config/comparison_instances.txt"
time_limit_seconds = 3600

[suites.nightly]
description = "Nightly CI regression suite"
sources = ["minlplib"]
max_variables = 30
max_instances = 100
time_limit_seconds = 1800

# Subsolver-specific suites
[suites.lp_netlib]
description = "Rust LP solver validation against Netlib"
sources = ["netlib"]
time_limit_seconds = 300

[suites.lp_kennington]
description = "Rust LP solver on Kennington large-scale set"
sources = ["kennington"]
time_limit_seconds = 600

[suites.nlp_cutest]
description = "Hybrid NLP solver validation against CUTEst"
sources = ["cutest"]
filter_convex = true
time_limit_seconds = 300

[suites.sparse_matrices]
description = "Sparse factorization validation against SuiteSparse"
sources = ["suitesparse"]
time_limit_seconds = 60

[suites.pooling]
description = "Pooling problems (GPU-amenable target class)"
sources = ["minlplib"]
problem_class = "pooling"
time_limit_seconds = 3600

[suites.gpu_scaling]
description = "GPU batching scalability measurement"
sources = ["minlplib"]
min_nodes_expected = 1000
max_variables = 50
time_limit_seconds = 3600

[suites.global_opt]
description = "Global optimality verification (instances with known optima)"
sources = ["minlplib"]
instance_list_inline = [
  "ex1221", "ex1225", "ex1226",
  "nvs01", "nvs03", "nvs04", "nvs06", "nvs07", "nvs08",
  "gear", "gear3", "gear4", "alan", "dispatch",
]
time_limit_seconds = 120

[suites.lp]
description = "Pure LP instances"
sources = ["minlplib"]
problem_class = "lp"
time_limit_seconds = 60

[suites.qp]
description = "Quadratic programming instances"
sources = ["minlplib"]
problem_class = "qp"
time_limit_seconds = 120

[suites.convex_nlp]
description = "Convex NLP instances"
sources = ["minlplib"]
problem_class = "convex_nlp"
time_limit_seconds = 300

[suites.nonconvex_nlp]
description = "Non-convex NLP instances"
sources = ["minlplib"]
problem_class = "nonconvex_nlp"
time_limit_seconds = 600

# ─────────────────────────────────────────────────────────────
# PHASE GATE CRITERIA
# These are the automated go/no-go checks at each phase boundary.
# ─────────────────────────────────────────────────────────────

[gates.phase1]
description = "Phase 1 → Phase 2 gate (Month 14)"

  [gates.phase1.criteria]
  minlplib_solved_count = { min = 25, suite = "phase1", metric = "solved_count" }
  nlp_convergence_rate = { min = 0.80, suite = "nlp_cutest", metric = "convergence_rate" }
  lp_netlib_pass_rate = { min = 0.95, suite = "lp_netlib", metric = "pass_rate" }
  lp_vs_highs_geomean = { max = 3.0, suite = "lp_netlib", metric = "geomean_ratio_vs_highs" }
  sparse_accuracy = { max = 1e-12, suite = "sparse_matrices", metric = "max_residual_vs_suitesparse" }
  relaxation_valid = { min = 1.0, suite = "phase1", metric = "relaxation_validity_rate" }
  interop_overhead = { max = 0.05, suite = "phase1", metric = "python_orchestration_fraction" }
  zero_incorrect = { max = 0, suite = "phase1", metric = "incorrect_count" }

[gates.phase2]
description = "Phase 2 → Phase 3 gate (Month 26)"

  [gates.phase2.criteria]
  minlplib_30var_solved = { min = 55, suite = "phase2", metric = "solved_count_le30var" }
  minlplib_50var_solved = { min = 25, suite = "phase2", metric = "solved_count_le50var" }
  geomean_vs_couenne = { max = 3.0, suite = "comparison", metric = "geomean_ratio_vs_couenne" }
  gpu_speedup = { min = 15.0, suite = "gpu_scaling", metric = "gpu_vs_cpu_speedup" }
  root_gap_vs_baron = { max = 1.3, suite = "comparison", metric = "root_gap_ratio_vs_baron" }
  node_throughput = { min = 200, suite = "phase2", metric = "median_nodes_per_second" }
  rust_overhead = { max = 0.05, suite = "phase2", metric = "rust_tree_overhead_fraction" }
  zero_incorrect = { max = 0, suite = "phase2", metric = "incorrect_count" }

[gates.phase3]
description = "Phase 3 → Phase 4 gate (Month 38)"

  [gates.phase3.criteria]
  minlplib_30var_solved = { min = 75, suite = "phase3", metric = "solved_count_le30var" }
  minlplib_50var_solved = { min = 45, suite = "phase3", metric = "solved_count_le50var" }
  minlplib_100var_solved = { min = 20, suite = "phase3", metric = "solved_count_le100var" }
  geomean_vs_baron = { max = 2.5, suite = "comparison", metric = "geomean_ratio_vs_baron" }
  gpu_class_vs_baron = { max = 1.0, suite = "pooling", metric = "geomean_ratio_vs_baron" }
  learned_branching_improvement = { min = 0.20, suite = "phase3", metric = "node_reduction_vs_classical" }
  zero_incorrect = { max = 0, suite = "full", metric = "incorrect_count" }

[gates.phase4]
description = "Release gate (Month 48)"

  [gates.phase4.criteria]
  minlplib_30var_solved = { min = 85, suite = "full", metric = "solved_count_le30var" }
  minlplib_100var_solved = { min = 30, suite = "full", metric = "solved_count_le100var" }
  geomean_vs_baron = { max = 1.5, suite = "comparison", metric = "geomean_ratio_vs_baron" }
  classes_faster_than_baron = { min = 2, suite = "full", metric = "problem_classes_beating_baron" }
  beats_couenne = { min = 1.0, suite = "comparison", metric = "solve_count_ratio_vs_couenne" }
  beats_bonmin = { min = 1.0, suite = "comparison", metric = "solve_count_ratio_vs_bonmin" }
  zero_incorrect = { max = 0, suite = "full", metric = "incorrect_count" }

# Certification-gap plan (docs/dev/certification-gap-plan.md) phase gates.
[gates.cert0]
description = "Phase 0 → Phase 1 gate: certification observability (cert:T0.5)"

  [gates.cert0.criteria]
  # root_gap must be populated on >= 90% of rows so root_gap_ratio_vs_baron is
  # evaluable (the T0.1 producer). Correctness stays a zero-slack gate.
  root_gap_coverage = { min = 0.9, suite = "global50", metric = "root_gap_populated_fraction" }
  zero_incorrect = { max = 0, suite = "global50", metric = "incorrect_count" }

# ─────────────────────────────────────────────────────────────
# SOLVER CONFIGURATIONS
# ─────────────────────────────────────────────────────────────

# Per-category benchmark suites
# NOTE: these per-class suites filter by problem class. The bundled local set
# (python/tests/data/minlplib*) contains NO pure-LP or MILP instances, so
# lp_*/milp_* populate only when the full MINLPLib is fetched (--fetch /
# --use-cache, which filters off MINLPLib's official `cat` field). The
# locally-runnable classes (qp/miqp/minlp/global_opt) use an explicit
# instance_list_inline of verified bundled instances so they work out of the box
# instead of silently grabbing the first N generic instances alphabetically.

[suites.lp_smoke]
description = "LP smoke tests (no LP bundled locally — requires --fetch)"
sources = ["minlplib"]
problem_class = "lp"
max_instances = 5
time_limit_seconds = 60

[suites.lp_full]
description = "LP full benchmark (requires --fetch)"
sources = ["minlplib"]
problem_class = "lp"
max_instances = 20
time_limit_seconds = 300

[suites.qp_smoke]
description = "QP smoke tests"
sources = ["minlplib"]
instance_list_inline = ["meanvar"]
time_limit_seconds = 60

[suites.qp_full]
description = "QP full benchmark (more instances with --fetch)"
sources = ["minlplib"]
problem_class = "qp"
max_instances = 20
time_limit_seconds = 300

[suites.milp_smoke]
description = "MILP smoke tests (no MILP bundled locally — requires --fetch)"
sources = ["minlplib"]
problem_class = "milp"
max_instances = 5
time_limit_seconds = 120

[suites.milp_full]
description = "MILP full benchmark (requires --fetch)"
sources = ["minlplib"]
problem_class = "milp"
max_instances = 20
time_limit_seconds = 600

[suites.miqp_smoke]
description = "MIQP smoke tests"
sources = ["minlplib"]
instance_list_inline = ["alan", "gbd", "meanvarx", "nvs15", "st_e27"]
time_limit_seconds = 120

[suites.miqp_full]
description = "MIQP full benchmark (more instances with --fetch)"
sources = ["minlplib"]
problem_class = "miqp"
max_instances = 15
time_limit_seconds = 600

[suites.minlp_smoke]
description = "MINLP smoke tests"
sources = ["minlplib"]
instance_list_inline = ["ex1221", "ex1226", "nvs01", "nvs03", "gear"]
time_limit_seconds = 120

[suites.minlp_full]
description = "MINLP full benchmark (more instances with --fetch)"
sources = ["minlplib"]
problem_class = "minlp"
max_instances = 30
time_limit_seconds = 600

[suites.global_opt_smoke]
description = "Global optimization smoke tests (known-optima nonconvex instances)"
sources = ["minlplib"]
instance_list_inline = ["ex1221", "ex1225", "ex1226", "nvs01", "nvs03"]
time_limit_seconds = 120

[suites.global_opt_full]
description = "Global optimization full benchmark"
max_instances = 20
time_limit_seconds = 600

# ── MINLPTests.jl standardized suites ─────────────────────────────────────
# Problems translated from https://github.com/jump-dev/MINLPTests.jl (MIT).
# Correctness tests: python/tests/test_minlptests.py
# Phase gate: minlptests_nlp_cvx_pass_rate added at phase 2.

[suites.minlptests_smoke]
description = "MINLPTests.jl smoke (one instance per category)"
sources = ["minlptests"]
instance_list = [
    "minlptests_nlp_cvx_101_010",
    "minlptests_nlp_cvx_107_010",
    "minlptests_nlp_003_010",
    "minlptests_nlp_mi_005_010",
]
time_limit_seconds = 60

[suites.minlptests_nlp_cvx]
description = "MINLPTests.jl convex NLP suite (all registered nlp_convex instances)"
sources = ["minlptests"]
problem_class = "nlp_convex"
time_limit_seconds = 60

[suites.minlptests_nlp]
description = "MINLPTests.jl nonconvex NLP suite (all registered nlp_nonconvex instances)"
sources = ["minlptests"]
problem_class = "nlp_nonconvex"
time_limit_seconds = 120

[suites.minlptests_mi]
description = "MINLPTests.jl MINLP suite (all registered minlp_nonconvex instances)"
sources = ["minlptests"]
problem_class = "minlp_nonconvex"
time_limit_seconds = 300

# ─────────────────────────────────────────────────────────────
# SOLVER CONFIGURATIONS
# ─────────────────────────────────────────────────────────────

[solvers.discopt]
command = "discopt"
type = "internal"
options = { threads = 1 }

[solvers.discopt_cpu]
command = "discopt"
type = "internal"
options = { threads = 1 }

[solvers.baron]
command = "baron"
type = "external"
nl_interface = true
options = { threads = 1, epsa = 1e-6, epsr = 1e-4 }

[solvers.couenne]
command = "/Applications/AMPL/couenne"
type = "external"
nl_interface = true
options = { threads = 1 }
note = "COIN-OR Couenne 0.5.8 (AMPL-ASL build). Not on conda-forge for osx-arm64; the AMPL bundle ships an open-source ASL-linked binary that reads .nl directly (no AMPL license needed)."

[solvers.bonmin]
command = "/opt/homebrew/Caskroom/miniforge/base/envs/discopt-bench/bin/bonmin"
type = "external"
nl_interface = true
options = { threads = 1 }
note = "conda-forge coin-or-bonmin in the discopt-bench env."

[solvers.scip]
command = "/opt/homebrew/Caskroom/miniforge/base/envs/discopt-bench/bin/scip"
type = "external"
nl_interface = true
options = { threads = 1 }
note = "conda-forge scip 10.0.2 (SoPlex 8.0.2) in the discopt-bench env; has the AMPL/MP .nl reader. Driven via the SCIP batch -c interface."

[solvers.highs]
command = "/Applications/AMPL/highs"
type = "external"
nl_interface = true
options = { threads = 1 }
note = "HiGHS 1.11.0 (AMPL-ASL build) — reads .nl. NOTE: the conda-forge `highs` CLI is mps/lp-only and does NOT read .nl, so the .nl benchmark path must use the ASL build. LP/MILP only."
