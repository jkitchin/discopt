name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR/branch — saves CI minutes when
# pushes land in quick succession.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Decide whether this push/PR touches anything that could affect solver
  # behavior. Docs-/results-/config-only changes skip the heavy test jobs
  # (rust / python-fast / python-amp-coverage) below. Deliberately conservative:
  # `code=true` unless EVERY changed file is in the docs/results allowlist, and
  # `true` on any uncertainty (empty diff, missing base) — we never skip tests on
  # doubt, because a core-solver change's blast radius is the whole corpus.
  changes:
    name: Detect code changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        shell: bash
        run: |
          set -uo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=200 origin "${{ github.base_ref }}" || true
            base="$(git merge-base "origin/${{ github.base_ref }}" HEAD 2>/dev/null || true)"
            changed="$(git diff --name-only "${base:-HEAD~1}" HEAD 2>/dev/null || true)"
          else
            changed="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" 2>/dev/null \
                      || git diff --name-only HEAD~1 HEAD 2>/dev/null || true)"
          fi
          echo "Changed files:"; printf '%s\n' "$changed"
          # Allowlist of paths that can NOT affect solver behavior (safe to skip).
          allow='^(docs/|reports/|discopt_benchmarks/results/|.*\.md$|codecov\.yml$|LICENSE$|\.gitignore$)'
          if [ -z "$changed" ]; then
            code=true                                   # unknown/empty -> run
          elif printf '%s\n' "$changed" | grep -qvE "$allow"; then
            code=true                                   # >=1 non-allowlisted file -> run
          else
            code=false                                  # every change is docs/results -> skip
          fi
          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "=> code=$code (heavy test jobs will $([ "$code" = true ] && echo RUN || echo SKIP))"

  rust:
    name: Rust
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - run: cargo build -p discopt-core
      # Default features include `parallel` (rayon node loop).
      - run: cargo test -p discopt-core
      # The serial path is the correctness reference; keep it building and green
      # so it can't rot now that `parallel` is the default.
      - run: cargo test -p discopt-core --no-default-features
      - run: cargo clippy -p discopt-core -- -D warnings
      - run: cargo clippy -p discopt-core --no-default-features -- -D warnings
      # Determinism guard: the parallel and serial batch loops must explore a
      # bit-identical B&B tree. Run the knapsack bench under both feature sets
      # and diff everything except the mode banner and the wall-clock line
      # (node counts, pivot counts, and per-instance objectives must match).
      - name: Parallel ≡ serial tree equivalence
        run: |
          cargo run --release -q -p discopt-core --example par_bench \
            --no-default-features \
            | grep -vE '^mode:|^total wall:' > /tmp/par_bench_serial.txt
          cargo run --release -q -p discopt-core --example par_bench \
            | grep -vE '^mode:|^total wall:' > /tmp/par_bench_parallel.txt
          diff -u /tmp/par_bench_serial.txt /tmp/par_bench_parallel.txt \
            && echo "OK: parallel path explores an identical tree to serial"

  lint:
    name: Lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Run the SAME hooks (and the pinned ruff/mypy versions + mypy
      # type-resolution deps) that developers run locally — .pre-commit-config.yaml
      # is the single source of truth, so the local and CI toolchains can never
      # drift. cargo-fmt is skipped here (the Rust job covers fmt; no Rust
      # toolchain on this runner).
      - name: pre-commit (ruff, ruff-format, mypy)
        uses: pre-commit/action@v3.0.1
        env:
          SKIP: cargo-fmt
        with:
          extra_args: --all-files

  python-fast:
    name: Python fast (3.12, ubuntu)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # Match the workspace used by maturin so the cargo build cache hits.
          workspaces: ". -> target"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          pip install uv
      - name: Install system dependencies (Ipopt)
        # Ipopt comes from the standard Ubuntu repos (coinor-libipopt-dev). The
        # pre-baked packages.microsoft.com (azure-cli) apt source is unrelated and
        # intermittently serves a bad Release file ("Clearsigned file isn't valid
        # ... NOSPLIT"), which reds the whole job on a transient network hiccup.
        # Drop that source (we don't use azure-cli), then retry update+install a
        # few times with backoff so a transient mirror blip can't fail the suite.
        # cyipopt tests auto-skip when Ipopt is absent (see conftest), so even a
        # total install failure degrades to SKIP rather than ERROR.
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/azure-cli.list || true
          for i in 1 2 3; do
            sudo apt-get update && sudo apt-get install -y --no-install-recommends \
              coinor-libipopt-dev liblapack-dev libblas-dev gfortran && break
            echo "apt attempt $i failed; retrying in $((i * 15))s..." >&2
            sleep $((i * 15))
          done
      - name: Cache uv pip wheels
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-py312-${{ hashFiles('pyproject.toml', 'Cargo.lock', '.github/workflows/ci.yml') }}
          restore-keys: |
            uv-${{ runner.os }}-py312-
      - name: Install Python dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          uv pip install maturin
          uv pip install \
            jax jaxlib numpy scipy highspy cyipopt openpyxl scikit-learn pyyaml \
            pounce-solver \
            pytest pytest-timeout pytest-xdist
          maturin develop
      - name: Run pytest (PR-fast, parallel)
        run: |
          source .venv/bin/activate
          # Use all 4 vCPUs of the ubuntu-latest runner. Peak memory stays well
          # under the 16 GB runner (CPU-only JAX workers are ~1-2 GB RSS each),
          # and the heaviest multi-minute solves now carry `slow` so they no
          # longer pin a worker for the whole run.
          # --dist loadgroup keeps tests sharing a class on the same worker
          #   so xdist-incompatible fixtures stay serialized.
          # Coverage is intentionally dropped from the PR path — see the
          # `python-coverage` job (nightly + label-triggered) for full coverage.
          scripts/run_memory_capped_pytest.sh pytest python/tests/ \
            -q --tb=short --timeout=120 \
            -m "not slow and not correctness and not integration and not amp_benchmark and not requires_cyipopt and not memory_heavy" \
            --ignore=python/tests/test_correctness.py \
            -n "${PYTEST_XDIST_WORKERS}" --dist loadgroup \
            --durations=20
        env:
          JAX_PLATFORMS: cpu
          JAX_ENABLE_X64: "1"
          PYTEST_MEMORY_LIMIT_MB: "32768"
          PYTEST_XDIST_WORKERS: "4"

  python-coverage:
    name: Python coverage (3.12, ubuntu)
    # Run coverage on main pushes, or on PRs explicitly opted in
    # via the `coverage` label.
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
        contains(github.event.pull_request.labels.*.name, 'coverage'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          pip install uv
      - name: Install system dependencies (Ipopt)
        # Same hardening as the python-fast job: drop the unrelated, flaky
        # packages.microsoft.com apt source and retry update+install with backoff.
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/azure-cli.list || true
          for i in 1 2 3; do
            sudo apt-get update && sudo apt-get install -y --no-install-recommends \
              coinor-libipopt-dev liblapack-dev libblas-dev gfortran && break
            echo "apt attempt $i failed; retrying in $((i * 15))s..." >&2
            sleep $((i * 15))
          done
      - name: Cache uv pip wheels
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-py312-cov-${{ hashFiles('pyproject.toml', 'Cargo.lock', '.github/workflows/ci.yml') }}
          restore-keys: |
            uv-${{ runner.os }}-py312-cov-
      - name: Install Python dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          uv pip install maturin
          uv pip install \
            jax jaxlib numpy scipy highspy cyipopt openpyxl scikit-learn pyyaml \
            pounce-solver \
            pytest pytest-timeout pytest-xdist pytest-cov
          maturin develop
      # --cov-fail-under temporarily lowered from 85 -> 70 -> 65 after the
      # AMP merge (#86) dropped total project coverage to ~69%. Restore
      # to 85 once AMP test coverage is expanded -- see #87.
      - name: Run pytest with coverage
        run: |
          source .venv/bin/activate
          scripts/run_memory_capped_pytest.sh pytest python/tests/ \
            -q --tb=short --timeout=120 \
            -m "not slow and not correctness and not integration and not amp_benchmark and not requires_cyipopt and not memory_heavy" \
            --ignore=python/tests/test_correctness.py \
            -n "${PYTEST_XDIST_WORKERS}" --dist loadgroup \
            --cov=discopt --cov-report=term-missing --cov-report=xml:coverage.xml \
            --cov-fail-under=65
        env:
          JAX_PLATFORMS: cpu
          JAX_ENABLE_X64: "1"
          PYTEST_MEMORY_LIMIT_MB: "32768"
          PYTEST_XDIST_WORKERS: "4"
      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  python-amp-coverage:
    name: Python AMP coverage (3.12, ubuntu)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin
          pip install jax jaxlib numpy scipy highspy pytest pytest-timeout pytest-cov "ruff==0.14.6"
          maturin develop
      - name: Test AMP fast battery with coverage
        run: |
          source .venv/bin/activate
          scripts/run_memory_capped_pytest.sh pytest python/tests/test_amp.py -v --timeout=120 -m "not slow and not integration and not amp_benchmark and not requires_cyipopt and not memory_heavy" --cov=discopt --cov-report=term-missing --cov-report=xml:coverage-amp.xml
        env:
          JAX_PLATFORMS: cpu
          JAX_ENABLE_X64: "1"
          PYTEST_MEMORY_LIMIT_MB: "32768"
      - name: Upload AMP coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage-amp.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
